[server]
port = 8300
host = "127.0.0.1"
data_dir = "./data"

# Add agents here. Each gets a status pill, @mention routing, and color.
# "cwd" is the working directory for the agent's terminal session.
# "command" is the CLI command (must be on PATH).

[agents.claude]
command = "claude"
cwd = ".."
color = "#da7756"
label = "Claude"
model_flag_template = "--model {model}"

[agents.claude.modes.yolo]
args = ["--dangerously-skip-permissions"]

[agents.codex]
command = "codex"
cwd = ".."
color = "#10a37f"
label = "Codex"
model_flag_template = "--model {model}"
effort_flag_template = '-c model_reasoning_effort="{effort}"'

[agents.codex.modes.bypass]
args = ["--dangerously-bypass-approvals-and-sandbox"]

[agents.gemini]
command = "gemini"
cwd = ".."
color = "#4285f4"
label = "Gemini"
model_flag_template = "--model {model}"

[agents.gemini.modes.yolo]
args = ["--yolo"]

[agents.kimi]
command = "kimi"
cwd = ".."
color = "#1783ff"
label = "Kimi"

[agents.qwen]
command = "qwen"
cwd = ".."
color = "#8b5cf6"
label = "Qwen"
mcp_inject = "settings_file"
mcp_settings_path = ".qwen/settings.json"
mcp_transport = "http"
inject_delay = 1.0
model_flag_template = "--model {model}"

[agents.qwen.modes.yolo]
args = ["--yolo"]

[agents.kilo]
command = "kilo"
cwd = ".."
color = "#f7f677"
label = "Kilo"

[agents.codebuddy]
command = "codebuddy"
cwd = ".."
color = "#6C4DFF"
label = "CodeBuddy"
mcp_inject = "settings_file"
mcp_settings_path = "~/.codebuddy/.mcp.json"
mcp_transport = "http"
mcp_http_key = "url"

[agents.copilot]
command = "copilot"
cwd = ".."
color = "#8534F3"
label = "Copilot"
mcp_inject = "settings_file"
mcp_settings_path = "~/.copilot/mcp-config.json"
mcp_transport = "http"
mcp_http_key = "url"
enter_backend = "wm_setfocus"

[agents.agy]
command = "agy"
cwd = ".."
color = "#00bcd4"
label = "Antigravity"
mcp_inject = "settings_file"
mcp_settings_path = "~/.gemini/config/mcp_config.json"
mcp_settings_style = "plain"
mcp_http_key = "serverUrl"
mcp_transport = "http"

[agents.agy.modes.yolo]
args = ["--dangerously-skip-permissions"]

[agents.minimax]
type = "api"
base_url = "https://api.minimax.io/v1"
model = "MiniMax-M3"
color = "#2fe898"
label = "MiniMax"
api_key_env = "MINIMAX_API_KEY"
temperature = 1.0

[routing]
# "none" = only route on explicit @mention. "all" = route to all agents by default.
default = "none"
max_agent_hops = 4

[mcp]
http_port = 8200
sse_port = 8201

[images]
upload_dir = "./uploads"
max_size_mb = 10

# --- Launch args, modes, model & effort ---
# Per-agent keys that shape the agent CLI's command line:
#
#   args = ["--flag", "value"]     — always passed to this agent
#   model = "opus"                 — rendered through model_flag_template
#   effort = "high"                — rendered through effort_flag_template
#
# Model and effort are values, not flags, because every CLI spells them
# differently. Each agent declares how to render them:
#
#   model_flag_template  = "--model {model}"
#   effort_flag_template = '-c model_reasoning_effort="{effort}"'
#
# Templates are split on whitespace (not shell-lexed) so quotes inside a
# template reach the agent intact — codex needs "high" quoted to parse it as
# TOML. An agent with no template for a key simply can't honour it, and the
# wrapper warns rather than dropping it silently. Leave a template unset for
# CLIs whose flag you don't know instead of guessing.
#
# Named modes are presets of the same keys:
#
#   [agents.codex.modes.deep]
#   effort = "high"
#   args = ["--dangerously-bypass-approvals-and-sandbox"]
#
# Run them with `agentchattr up codex:deep` or `wrapper.py codex --mode deep`.
# Precedence, lowest to highest: agent keys, mode keys, then --model/--effort
# on the command line. `args` accumulate (agent's first, then the mode's,
# then anything after `--` on the wrapper's command line).

# --- Per-agent environment ---
# The agent is exec'd directly, with no shell, so `command` must name one
# executable — a "VAR=val cmd" prefix is read as part of the program's name
# and won't resolve. Set environment with an env table instead:
#
#   [agents.agy2.env]
#   HOME = "/home/you/.agy-profiles/agy2"
#
# Overriding HOME is how you run a second profile of a CLI that keeps its
# login under HOME, so two instances can be signed in to different accounts.
# It applies before PATH lookup, and `~` in mcp_settings_path expands against
# it — settings land where that agent will actually read them.
#
#   strip_env = ["VAR"]  — remove variables from the agent's environment
#                          (CLAUDECODE is always stripped)

# --- MCP injection modes ---
# By default, claude/codex/gemini/kimi use built-in MCP config injection.
# For other CLI agents, set mcp_inject to tell the wrapper how to inject auth:
#
# mcp_inject modes:
#   "settings_file" — write a JSON settings file at mcp_settings_path (merges, not overwrites)
#   "env"           — write a settings file, expose path via mcp_env_var
#   "flag"          — write a config file, pass via CLI flag (mcp_flag, default: --mcp-config)
#   "proxy_flag"    — start a local proxy, pass URL via CLI flag template
#
# Example: Qwen Code CLI
#   [agents.qwen]
#   command = "qwen"
#   cwd = ".."
#   color = "#8b5cf6"
#   label = "Qwen"
#   mcp_inject = "settings_file"
#   mcp_settings_path = ".qwen/settings.json"
#   mcp_transport = "http"
#
# Example: CLI with env var for settings
#   [agents.mycli]
#   command = "mycli"
#   mcp_inject = "env"
#   mcp_env_var = "MYCLI_MCP_SETTINGS"
#   mcp_transport = "http"
#
# Optional settings_file tweaks:
#   mcp_http_key = "url"          — JSON key for the server URL (default "httpUrl";
#                                   CodeBuddy/Copilot use "url", Antigravity "serverUrl")
#   mcp_settings_style = "plain"  — write a bare {<key>: url, headers: ...} entry
#                                   without "type"/"trust"/security keys, for CLIs
#                                   with strict config schemas (e.g. Antigravity)

# --- Login prompt watching ---
# The wrapper watches each agent's terminal for login/authentication prompts
# (expired session, first launch, revoked token). When one is detected, a
# system message is posted in the chat UI so a human can attach to the
# agent's terminal and complete the login; an all-clear is posted once the
# prompt goes away. Per-agent options:
#   login_watch = false               — disable the watcher for this agent
#   login_patterns = ["extra regex"]  — additional patterns (case-insensitive)
#                                       matched against the visible terminal

# --- Quota / usage-limit watching ---
# The wrapper also watches each agent's terminal for quota exhaustion
# ("usage limit reached", "out of credits", rate limits, HTTP 429). An
# agent that runs out of quota can't announce it — the MCP call to send a
# final message is blocked by the very limit it hit — so the wrapper
# detects the limit screen (costs no agent quota) and the server posts a
# system message on the agent's behalf, including the reset time when the
# CLI prints one ("resets 3am", "try again in 4 hours"). When the reset
# time passes, the server posts that the agent should be usable again.
# Per-agent options:
#   quota_watch = false               — disable the watcher for this agent
#   quota_patterns = ["extra regex"]  — additional patterns (case-insensitive)
#   quota_reset_hours = 5             — fallback reset estimate (hours) when
#                                       the CLI doesn't print a reset time,
#                                       e.g. 5 for Claude's rolling 5-hour
#                                       window. 0/unset = no estimate.

# --- API agents (local models) ---
# Add local model agents in config.local.toml (gitignored).
# Example config.local.toml:
#
#   [agents.qwen]
#   type = "api"
#   base_url = "http://localhost:8189/v1"
#   model = "qwen3-4b"
#   color = "#8b5cf6"
#   label = "Qwen"
#   # api_key_env = "MY_API_KEY"     # optional: env var name for API key
#   # system_prompt = "You are ..."   # optional: custom system prompt
#
# Then run: python wrapper_api.py qwen
